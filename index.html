<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project: Sign-up form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="page-layout">
        <img class="bg-img" src="./assets/halie-west-25xggax4bSA-unsplash.jpg" alt="Ferns in a tropical forest">

        <div class="form-container">
            <div class="intro">
                <p>
                    This is not a real online service! You know you need something like this in your life to help you
                    realize your deepest dreams. Sign up <em>now</em> to get started
                </p>

                <p>You <em>know</em> you want to.</p>
            </div>

            <form action="#" method="post">
                <fieldset>
                    <legend>Let's do this!</legend>
                    <label for="first-name">FIRST NAME</label>
                    <input type="text" name="first-name" id="first-name">

                    <label for="last-name">LAST NAME</label>
                    <input type="text" name="last-name" id="last-name">

                    <label for="password">PASSWORD</label>
                    <input type="password" name="password" id="password">

                    <label for="confirm-password">PASSWORD</label>
                    <input type="password" name="confirm-password" id="confirm-password">
                </fieldset>

                <div class="submit-area">
                    <button type="submit">Create Account</button>
                    <p>Already have an account <a href="#">Log in</a>
                    </p> 
                </div>
            </form>

        </div>
    </div>
</body>

</html>
