<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project: Sign-up form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="page-layout">
        <div class="bg-img">
            <img class="bg-img" src="./assets/halie-west-25xggax4bSA-unsplash.jpg" alt="Ferns in a tropical forest">
            <div class="odin-logo">
                <img src="./assets/odin-logo.png" alt="Odin logo"> ODIN
            </div>

            <div class="credits">
                Photo by <a href="https://unsplash.com/@haliewestphoto">Halie West</a> on <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA">Unsplash</a>
            </div>
        </div>

        <form action="#" method="post">
            <div class="intro">
                <p>
                    This is not a real online service! You know you need something like this in your life to help you
                    realize your deepest dreams.
                    <br> 
                    Sign up <em>now</em> to get started
                </p>

                <p>You <em>know</em> you want to.</p>
            </div>

            <div class="input-area">
                <p>Let's do this!</p>

                <div class="input-field-parent">
                    <div class="input-field-child">
                        <label for="first-name">first name</label>
                        <input type="text" name="first-name" id="first-name">
                    </div>

                    <div class="input-field-child">
                        <label for="last-name">last name</label>
                        <input type="text" name="last-name" id="last-name">
                    </div>
                    <div class="input-field-child">
                        <label for="email">email</label>
                        <input type="email" name="email" id="email">
                    </div>
                    <div class="input-field-child">
                        <label for="tel">phone number</label>
                        <input type="tel" name="tel" id="tel">
                    </div>
                    <div class="input-field-child">
                        <label for="password">password</label>
                        <input type="password" name="password" id="password" required minlength="6">
                    </div>
                    <div class="input-field-child">
                        <label for="confirm-password">confirm password</label>
                        <input type="password" name="confirm-password" id="confirm-password" required minlength="6">
                    </div>
                </div>
            </div>

            <div class="submit-area">
                <button type="submit">Create Account</button>
                <p>Already have an account <a href="#">Log in</a>
                </p>
            </div>
        </form>

    </div>

</body>

</html>
